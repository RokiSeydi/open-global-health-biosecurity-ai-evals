title: "Cultural Confabulation: Contextual Validity Evaluation for Global Health AI Deployment"
description: |
  Evaluates whether frontier LLMs demonstrate cultural contextual validity when
  interpreting longitudinal health narratives from culturally diverse, non-Western
  populations. Tests for six documented failure modes — temporal flattening,
  institutional reflex, compliance framing, role collapse, over-medicalization,
  and procedural care without interpretation — that produce medically coherent
  but contextually inappropriate responses. These failures are not captured by
  existing benchmarks. v0.2 evaluates four cases: a first-generation immigrant
  health narrative in Italian (D1_IT_001), a diagnostic odyssey in the UK NHS
  (D1_UK_001), PCOS management across NHS and private care (D1_UK_002), and
  cross-border invisible disability navigation (D1_UK_003). Based on: Seydi,
  R. (2026). Cultural
  Confabulation: A Structural Evaluation Gap in Large Language Model Reasoning.
group: Knowledge
contributors:
